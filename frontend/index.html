<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DDOT Notice of Intents</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator.min.css" rel="stylesheet">

</head>
<body>

  <div class="navbar">
    <h1>DDOT Notice of Intent Viewer</h1>
  </div>

  <div class="layout">

    <!-- LEFT SIDE: Filters + Buckets together -->
    <div class="left-pane">

      <div id="filters" class="filters">
        <input id="filter-noi" type="text" placeholder="Search NOI ID…" />
        <input id="filter-email" type="text" placeholder="Search contact email…" />

        <select id="filter-status">
          <option value="all">All NOIs</option>
          <option value="open">Open Only</option>
          <option value="closed">Closed Only</option>
        </select>
      </div>

      <section id="buckets"></section>

    </div>
    
  <section id="detail" class="right-pane hidden">
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <button id="download-comments" class="download-btn">Download Comments</button>
    </div>
    <div id="comments"></div>
  </section>


  </div>

  <!-- Tabulator JS -->
  <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

  <!-- Your script -->
  <script src="js/main.js"></script>

</body>
</html>
