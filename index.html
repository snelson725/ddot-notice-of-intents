<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DDOT Notice of Intents</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@5.6.0/dist/js/tabulator.min.js"></script>

</head>
<body>

  <div class="navbar">
    <h1>DDOT Notice of Intent Viewer</h1>
  </div>

  <div class="content">
    
    <button onclick="login()">Login to ArcGIS</button>
    <p id="output"></p>
    <button id="download">Download CSV</button>

    <h2>View and Manage Notices</h2>
    <p>Data updated on <span id="current-date"></span>.</p>

    <section style="margin-top: 30px;">
      <h2>NOI Summary</h2>
      <p>This table shows all NOIs, including those with zero comments.</p>
      <div id="summary-table"></div>
    </section>

    <section style="margin-top: 40px;">
      <h2 id="detail-title" style="display:none;"></h2>
      <div id="detail-table"></div>
    </section>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
