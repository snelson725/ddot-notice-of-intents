<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DDOT Notice of Intents</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@5.6.0/dist/js/tabulator.min.js"></script>

</head>
<body>

  <div class="navbar">
    <h1>DDOT Notice of Intent Viewer</h1>
  </div>

  <div class="content">
    
    <h2>View and Manage Notices</h2>
    <button onclick="login()">Login to ArcGIS</button>
    <button onclick="loadLayer()">Load NOI Comments</button>
    <button id="download">Download CSV</button>
    <br>
    <div id="output"></div>

    <div id="table"></div>

    <div id="comment-detail" style="display:none; margin-top:16px; padding:12px; border:1px solid #ccc; background:#fafafa;">
      <strong>Full Comment:</strong>
      <div id="comment-text" style="white-space:pre-wrap; margin-top:6px;"></div>
    </div>


  </div>
  <script src="js/main.js"></script>
</body>
</html>
